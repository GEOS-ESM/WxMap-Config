stream:

  GEOSFPANA:

    long_name: GEOS FP
    description: GEOS FP Analysis
    type: analysis
    downloading: enabled
    access: public
    uri: /discover/nobackup/projects/gmao/yotc/pub/f5295_fp/opendap/assim/$collection
  # uri: /discover/nobackup/projects/gmao/yotc/pub/fp/opendap/assim/$collection
    service: !!python/object/apply:dataservice.GEOSDDF []
    animation: enabled
    max_frames: 20
    institution: NASA - Global Modeling and Assimilation Office (GMAO)
    reference: http://gmao.gsfc.nasa.gov/GEOS/geos5/index_pubs.php
    link: http://gmao.gsfc.nasa.gov/GEOS
    logos: [nasa-logo-ul, gmao-logo-ur]

field:
  
  GEOSFPANA:
    
    _niexttau:
      long_name: Nitrate Extinction AOT [550 nm]
      units: '1'
      expression: niexttau.inst1_2d_hwl_Nx(z=1)
  
    _duexttau:
      long_name: Dust Extinction AOT [550 nm]
      units: '1'
      expression: duexttau.inst1_2d_hwl_Nx(z=1)

    _totexttau:
      long_name: Total Aerosol Extinction AOT [550 nm]
      units: '1'
      expression: totexttau.inst1_2d_hwl_Nx(z=1)
  
    _suexttau:
      long_name: SO4 Extinction AOT [550 nm]
      units: '1'
      expression: suexttau.inst1_2d_hwl_Nx(z=1)
  
    _ssexttau:
      long_name: Sea Salt Extinction AOT [550 nm]
      units: '1'
      expression: ssexttau.inst1_2d_hwl_Nx(z=1)
  
    _ocexttau:
      long_name: Organic Carbon Extinction AOT [550 nm]
      units: '1'
      expression: ocexttau.inst1_2d_hwl_Nx(z=1)
  
    _bcexttau:
      long_name: Black Carbon Extinction AOT [550 nm]
      units: '1'
      expression: bcexttau.inst1_2d_hwl_Nx(z=1)
map:

  map-smoke:
    service: SmokeForecastBasemap_200406.3x21600x10800
    file: /discover/nobackup/jardizzo/maps/BlueMarble/SmokeForecastBasemap_200406.3x21600x10800.png
    line_color: 0 0 0 100
    line_width: 2
    water_color: 0 0 0 0
    land_color: 0 0 0 0
    layers: [water, land, lsmask, us_states, Canada_Province]

region:

  nam:
    
    long_name: North America
    lon: -180 180
    lat: 0 90
    mpdset: hires
    mproj: nps
    mpvals: 230 310 20 86
    frame: 'off'

AOT_alpha: &AOT_ALPHA
  alpha:
    - 0.00 0.0 0.0
    - 0.10 0.0 0.0
    - 0.50 1.0 1.0
    - 1.00 1.0 1.0

alpha_default: &alpha1
  alpha:
    - 0.00 0.0 0.0
  # - 0.30 1.0 1.0
    - 0.0786 1.0 1.0
    - 1.00 1.0 1.0

theme:

  plot:

    bcexttau:
      long_name: BC AOD
      levels: [0]
      layers: [bcexttau]
      title: 'Black Carbon AOD'
      map:
        layers: [map-smoke]

  layer:

    ssexttau:
      gxout: shaded
      expr: _ssexttau*2.5
      cbar: SSEXTTAU
      cbunits:
      clevs:
      cmin: 0
      cmax: 1
      cint: 0.1
      nsub: 10
      skip: 10
      scale:
      <<: *alpha1

    duexttau:
      gxout: shaded
      expr: _duexttau*1.5
      cbar: DUEXTTAU
      cbunits: 
      clevs:
      cmin: 0
      cmax: 1
      cint: 0.1
      nsub: 10
      skip: 10
      scale:
      <<: *alpha1

    suexttau:
      gxout: shaded
      expr: _suexttau*2.5
      cbar: SUEXTTAU
      cbunits:
      clevs:
      cmin: 0
      cmax: 1
      cint: 0.1
      nsub: 10
      skip: 10
      scale:
      <<: *alpha1

    ocexttau:
      gxout: shaded
      expr: _ocexttau*2.5
      cbar: OCEXTTAU
      cbunits:
      clevs:
      cmin: 0
      cmax: 1
      cint: 0.1
      nsub: 10
      skip: 10
      scale:
      <<: *alpha1

    bcexttau:
      gxout: shaded
      expr: _bcexttau*5
      cbar: Colorbar_14C
      cbunits:
      clevs:
      cmin: 0
      cmax: 1
      cint: 0.1
      nsub: 10
      skip: 10
      scale:
      <<: *alpha1

    niexttau:
      gxout: shaded
      expr: _niexttau*20
      cbar: NIEXTTAU
      cbunits:
      clevs:
      cmin: 0
      cmax: 1
      cint: 0.1
      nsub: 10
      skip: 10
      scale:
      <<: *AOT_ALPHA
