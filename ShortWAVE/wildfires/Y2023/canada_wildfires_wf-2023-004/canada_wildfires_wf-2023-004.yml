stream:

  GEOSFPANA:

    long_name: GEOS FP
    description: GEOS FP Analysis
    type: analysis
    downloading: enabled
    access: public
    uri: /discover/nobackup/projects/gmao/yotc/pub/f5295_fp/opendap/assim/$collection
  # uri: /discover/nobackup/projects/gmao/yotc/pub/fp/opendap/assim/$collection
    service: !!python/object/apply:dataservice.GEOSDDF []
    animation: enabled
    max_frames: 20
    institution: NASA - Global Modeling and Assimilation Office (GMAO)
    reference: http://gmao.gsfc.nasa.gov/GEOS/geos5/index_pubs.php
    link: http://gmao.gsfc.nasa.gov/GEOS
    logos: [nasa-logo-ul, gmao-logo-ur]

  GEOSFPFC:

    long_name: GEOS FP
    description: GEOS $cycle
    type: forecast
    downloading: enabled
    access: public
    uri: /discover/nobackup/projects/gmao/yotc/pub/fp/opendap/fcast/$collection/$collection.%%Y%%m%%d_%%H
    service: !!python/object/apply:dataservice.GEOSDDF []
    animation: enabled
    max_frames: 20
    institution: NASA - Global Modeling and Assimilation Office (GMAO)
    reference: http://gmao.gsfc.nasa.gov/GEOS/geos5/index_pubs.php
    link: http://gmao.gsfc.nasa.gov/GEOS
    logos: [nasa-logo-ul, gmao-logo-ur]
field:

  GEOS: &GEOSptr

    _bccmass:
      long_name: Black Carbon Column Mass Density
      units: kg m-2
      expression: bccmass.inst1_2d_hwl_Nx

    _lwtup:
      long_name: Upwelling Longwave Flux at TOA
      units: W m-2
      expression: lwtup.tavg1_2d_rad_Nx(td=-1)

  GEOSFPFC: *GEOSptr

  GEOSFPANA: *GEOSptr
map:

  map-bccmass:
    line_color: 255 255 255
    line_width: 2
    water_color: 17 19 27
    land_color: 0 0 0 0
    layers: [standard, water, land, bluemarble, lsmask]
theme:

  plot:

    bccmass:
      long_name: PRECIP
      levels: [0]
      layers: [bccmass]
      title: 'Black Carbon Column Mass'
      map:
        frame: 'off'
        layers: [map-bccmass]
      olr:
        cmin: 140
        cmax: 360
        cint: 20

  layer:

    olr:
      gxout: shaded
      expr: _lwtup
      cbar: OLRgray
    # cbunits: 'Outgoing Longwave Radiation [W/m`a2`n]'
      cbunits: '--auto'
      nsub: 5
      skip: 5
      cmin: 140
      cmax: 320
      cint: 20
      clevs:
      scale:
      alpha:
        - 0.00 1.00 1.00
      # - 0.50 0.80 0.80
        - 0.75 0.00 0.00
        - 1.00 0.00 0.00

    bccmass:
      gxout: shaded
      expr: _bccmass*1.0e+6
      cbar: BCCMASS
    # cbunits: '[mg/m`a2`n]'
      cbunits:
      clevs:
      scale:
      cmin: 0
      cmax: 10
      cint: 1
      scale:
      nsub: 20
      skip: 20
      alpha:
        - 0.000 0.000 0.000
        - 0.040 0.000 0.000
        - 0.200 1.000 1.000
        - 1.000 1.000 1.000
region:

  nam:

    long_name: North America
    lon: 0 360
    lat: 0 90
    mpdset: hires
    mproj: nps
    mpvals: 230 310 20 86
    frame: 'off'

  conus:

    long_name: CONUS
    lon: -125 -65
    lat: 24 50
    mpdset: hires
    mproj: latlon
