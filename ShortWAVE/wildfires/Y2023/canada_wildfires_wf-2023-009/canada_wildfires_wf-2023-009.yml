stream:

  GEOSCFANA:
    long_name: GEOS CF
    description: GEOS CF Meteorological Replay
    type: analysis
    downloading: enabled
    access: public
    uri: /discover/nobackup/projects/gmao/geos_cf/pub/v1/opendap/assim/$collection
    service: !!python/object/apply:dataservice.GEOSDDF []
    animation: enabled
    max_frames: 20
    institution: NASA - Global Modeling and Assimilation Office (GMAO)
    reference: http://gmao.gsfc.nasa.gov/GEOS/geos5/index_pubs.php
    link: http://gmao.gsfc.nasa.gov/GEOS
    logos: [nasa-logo-ul, gmao-logo-ur]

field:
  
  GEOSCFANA:

    _pm25bcsfc:
      long_name: Black Carbon PM2.5
      units: 'ug m-3'
      expression: pm25bc_rh35_gcc.chm_tavg_1hr_g1440x721_v1(z=1)
  
map:

  map-smoke:
    service: SmokeForecastBasemap_200406.3x21600x10800
    file: /discover/nobackup/jardizzo/maps/BlueMarble/SmokeForecastBasemap_200406.3x21600x10800.png
    line_color: 0 0 0 100
    line_width: 2
    water_color: 0 0 0 0
    land_color: 0 0 0 0
    layers: [water, land, lsmask]

region:

  nam:
    
    long_name: North America
    lon: -180 180
    lat: 0 90
    mpdset: hires
    mproj: nps
    mpvals: 230 310 20 86
    frame: 'off'

  global:

    long_name: Global
    lon: -180 180
    lat: -90 90
    mpdset: lowres
    mproj: scaled
    mpvals:
    frame: 'off'

theme:

  plot:

    pm25bcsfc:
      long_name: BC PM25
      levels: [0]
      layers: [pm25bcsfc]
      title: 'Black Carbon PM25'
      map:
        layers: [map-smoke]

  layer:

    pm25bcsfc:
      gxout: shaded
      expr: _pm25bcsfc
      cbar: Colorbar_14C
      cbunits:
      clevs:
      cmin: 0
      cmax: 30
      cint: 3
      nsub: 20
      skip: 20
      scale:
      alpha:
        - 0.000 0.000 0.000
        - 0.050 1.000 1.000
        - 1.000 1.000 1.000

