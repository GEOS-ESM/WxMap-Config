stream:

  CONUS2KM:
    long_name: GEOS CONUS 2KM Replay
    description: GEOS CONUS 2KM Replay
    type: analysis
    downloading: enabled
    access: public
    uri: /discover/nobackup/projects/gmao/osse2/HWT/CONUS02KM/Feature-c2160_L137/holding/inst1_2d_asm_Nx/%Y%m/Feature-c2160_L137.inst1_2d_asm_Nx.%Y%m%d_%H%Mz.nc4
    service: !!python/object/apply:dataservice.GEOSDDF []
    animation: enabled
    max_frames: 20
    institution: NASA - Global Modeling and Assimilation Office (GMAO)
    reference: http://gmao.gsfc.nasa.gov/GEOS/geos5/index_pubs.php
    link: http://gmao.gsfc.nasa.gov/GEOS
    logos: [nasa-logo-ul, gmao-logo-ur]
field:
  
  CONUS2KM:
    
    _niexttau:
      long_name: Nitrate Extinction AOT [550 nm]
      units: '1'
      expression: niexttau.inst1_2d_asm_Nx(z=1)
  
    _duexttau:
      long_name: Dust Extinction AOT [550 nm]
      units: '1'
      expression: duexttau.inst1_2d_asm_Nx(z=1)

    _totexttau:
      long_name: Total Aerosol Extinction AOT [550 nm]
      units: '1'
      expression: totexttau.inst1_2d_asm_Nx(z=1)
  
    _suexttau:
      long_name: SO4 Extinction AOT [550 nm]
      units: '1'
      expression: suexttau.inst1_2d_asm_Nx(z=1)
  
    _ssexttau:
      long_name: Sea Salt Extinction AOT [550 nm]
      units: '1'
      expression: ssexttau.inst1_2d_asm_Nx(z=1)
  
    _ocexttau:
      long_name: Organic Carbon Extinction AOT [550 nm]
      units: '1'
      expression: ocexttau.inst1_2d_asm_Nx(z=1)
  
    _bcexttau:
      long_name: Black Carbon Extinction AOT [550 nm]
      units: '1'
      expression: bcexttau.inst1_2d_asm_Nx(z=1)
map:

  Canada_Province:
    shape_file: Canada/PROVINCE
    line_color: 255 255 255
    line_width: 1
    zorder: -1

  blackmarble-custom:
    service: blackmarble-12000x6000
    file: /discover/nobackup/jardizzo/maps/BlackMarble_2016/BlackMarble_2016_12000x6000_enhanced.png
    line_color: 255 255 255
    line_width: 1
    water_color: 0 0 0 0
    land_color: 0 0 0 0
    layers: [standard, water, land]
region:

  nam:
    
    long_name: North America
    lon: -180 180
    lat: 0 90
    mpdset: hires
    mproj: nps
    mpvals: 230 310 20 86
    addlayers: [Canada_Province]
    frame: 'off'

AOT_alpha: &AOT_ALPHA
  alpha:
    - 0.00 0.0 0.0
    - 0.10 0.0 0.0
    - 0.50 1.0 1.0
    - 1.00 1.0 1.0

alpha_default: &alpha1
  alpha:
    - 0.00 0.0 0.0
    - 0.50 1.0 1.0
    - 1.00 1.0 1.0

theme:

  plot:

    aod:
      long_name: Aerosols
      levels: [0]
      layers: [ssexttau, suexttau, bcexttau, duexttau]
      title: 'AOT'
      map:
        layers: [blackmarble-custom]

  layer:

    ssexttau:
      gxout: shaded
      expr: _ssexttau*2.5
      cbar: SSEXTTAU
      cbunits:
      clevs:
      cmin: 0
      cmax: 1
      cint: 0.1
      nsub: 10
      skip: 10
      scale:
      <<: *alpha1

    duexttau:
      gxout: shaded
      expr: _duexttau*1.5
      cbar: DUEXTTAU
      cbunits: 
      clevs:
      cmin: 0
      cmax: 1
      cint: 0.1
      nsub: 10
      skip: 10
      scale:
      <<: *alpha1

    suexttau:
      gxout: shaded
      expr: _suexttau*2.5
      cbar: SUEXTTAU
      cbunits:
      clevs:
      cmin: 0
      cmax: 1
      cint: 0.1
      nsub: 10
      skip: 10
      scale:
      <<: *alpha1

    ocexttau:
      gxout: shaded
      expr: _ocexttau*2.5
      cbar: OCEXTTAU
      cbunits:
      clevs:
      cmin: 0
      cmax: 1
      cint: 0.1
      nsub: 10
      skip: 10
      scale:
      <<: *alpha1

    bcexttau:
      gxout: shaded
      expr: _bcexttau*5
      cbar: BCEXTTAU
      cbunits:
      clevs:
      cmin: 0
      cmax: 1
      cint: 0.1
      nsub: 10
      skip: 10
      scale:
      <<: *alpha1

    niexttau:
      gxout: shaded
      expr: _niexttau*20
      cbar: NIEXTTAU
      cbunits:
      clevs:
      cmin: 0
      cmax: 1
      cint: 0.1
      nsub: 10
      skip: 10
      scale:
      <<: *AOT_ALPHA
attribute:
  colorbar:
      BCEXTTAU:
        - 255   0  0
        - 242 118 94
        - 253 253 169

      SSEXTTAU:
        - 53 89 188
        - 255 255 234

      DUEXTTAU:
        - 102  51 153
        - 226 201 234

      SUEXTTAU:
        - 0 255 0
        - 100 255 100
