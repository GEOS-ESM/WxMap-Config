stream:

  GEOSFPANA:

    long_name: GEOS FP
    description: GEOS FP Analysis
    type: analysis
    downloading: enabled
    access: public
    uri: /discover/nobackup/projects/gmao/yotc/pub/f5295_fp/opendap/assim/$collection
  # uri: /discover/nobackup/projects/gmao/yotc/pub/fp/opendap/assim/$collection
    service: !!python/object/apply:dataservice.GEOSDDF []
    animation: enabled
    max_frames: 20
    institution: NASA - Global Modeling and Assimilation Office (GMAO)
    reference: http://gmao.gsfc.nasa.gov/GEOS/geos5/index_pubs.php
    link: http://gmao.gsfc.nasa.gov/GEOS
    logos: [nasa-logo-ul, gmao-logo-ur]

field:
  
  GEOSFPANA:
    
    _niexttau:
      long_name: Nitrate Extinction AOT [550 nm]
      units: '1'
      expression: niexttau.inst1_2d_hwl_Nx(z=1)
  
    _duexttau:
      long_name: Dust Extinction AOT [550 nm]
      units: '1'
      expression: duexttau.inst1_2d_hwl_Nx(z=1)

    _totexttau:
      long_name: Total Aerosol Extinction AOT [550 nm]
      units: '1'
      expression: totexttau.inst1_2d_hwl_Nx(z=1)
  
    _suexttau:
      long_name: SO4 Extinction AOT [550 nm]
      units: '1'
      expression: suexttau.inst1_2d_hwl_Nx(z=1)
  
    _ssexttau:
      long_name: Sea Salt Extinction AOT [550 nm]
      units: '1'
      expression: ssexttau.inst1_2d_hwl_Nx(z=1)
  
    _ocexttau:
      long_name: Organic Carbon Extinction AOT [550 nm]
      units: '1'
      expression: ocexttau.inst1_2d_hwl_Nx(z=1)
  
    _bcexttau:
      long_name: Black Carbon Extinction AOT [550 nm]
      units: '1'
      expression: bcexttau.inst1_2d_hwl_Nx(z=1)
map:

  Canada_Province:
    shape_file: Canada/PROVINCE
    line_color: 255 255 255 100
    line_width: 1
    zorder: -1

  blackmarble-custom:
    service: blackmarble-12000x6000
    file: /discover/nobackup/jardizzo/maps/BlackMarble_2016/BlackMarble_2016_12000x6000_enhanced.png
    line_color: 255 255 255
    line_width: 1
    water_color: 0 0 0 0
    land_color: 0 0 0 0
    layers: [standard, water, land]

  shaderelief-custom:
    line_color: 255 255 255 100
    line_width: 1
    water_color: 0 0 0
    land_color: 0 0 0 0
    land_brightness: 0.4
    layers: [water, land, shaderelief, lsmask]

region:

  nam:
    
    long_name: North America
    lon: -180 180
    lat: 0 90
    mpdset: hires
    mproj: nps
    mpvals: 230 310 20 86
    frame: 'off'

  global:

    long_name: Global
    lon: -180 180
    lat: -90 90
    mpdset: lowres
    mproj: scaled
    mpvals:
    frame: 'off'

alpha_60: &alpha60
  alpha:
    - 0.00 0.0 0.0
    - 0.60 1.0 1.0
    - 1.00 1.0 1.0

alpha_50: &alpha50
  alpha:
    - 0.00 0.0 0.0
    - 0.50 1.0 1.0
    - 1.00 1.0 1.0

alpha_30: &alpha30
  alpha:
    - 0.00 0.0 0.0
    - 0.30 1.0 1.0
    - 1.00 1.0 1.0

theme:

  plot:

    aod:
      long_name: Aerosols
      levels: [0]
      layers: [ssexttau, bcexttau]
      title: 'AOT'
      map:
        layers: [shaderelief-custom]

  layer:

    ssexttau:
      gxout: shaded
      expr: _ssexttau*2.5
      cbar: SSEXTTAU
      cbunits:
      clevs:
      cmin: 0
      cmax: 1
      cint: 0.1
      nsub: 10
      skip: 10
      scale:
      <<: *alpha30

    duexttau:
      gxout: shaded
      expr: _duexttau*1.5
      cbar: DUEXTTAU
      cbunits: 
      clevs:
      cmin: 0
      cmax: 1
      cint: 0.1
      nsub: 10
      skip: 10
      scale:
      <<: *alpha50

    suexttau:
      gxout: shaded
      expr: _suexttau*2.5
      cbar: SUEXTTAU
      cbunits:
      clevs:
      cmin: 0
      cmax: 1
      cint: 0.1
      nsub: 10
      skip: 10
      scale:
      <<: *alpha60

    ocexttau:
      gxout: shaded
      expr: _ocexttau*2.5
      cbar: OCEXTTAU
      cbunits:
      clevs:
      cmin: 0
      cmax: 1
      cint: 0.1
      nsub: 10
      skip: 10
      scale:
      <<: *alpha50

    bcexttau:
      gxout: shaded
      expr: _bcexttau*2.5
      cbar: BCEXTTAU
      cbunits:
      clevs:
      cmin: 0
      cmax: 1
      cint: 0.1
      nsub: 10
      skip: 10
      scale:
      <<: *alpha30

    niexttau:
      gxout: shaded
      expr: _niexttau*20
      cbar: NIEXTTAU
      cbunits:
      clevs:
      cmin: 0
      cmax: 1
      cint: 0.1
      nsub: 10
      skip: 10
      scale:
      <<: *alpha50
attribute:
  colorbar:
      BCEXTTAU:
        - 255   0  0
        - 242 118 94
        - 253 253 169

      SSEXTTAU:
        - 53 89 188
        - 255 255 234

      DUEXTTAU:
        - 102  51 153
        - 226 201 234

      SUEXTTAU:
        - 0 255 0
        - 100 255 100
