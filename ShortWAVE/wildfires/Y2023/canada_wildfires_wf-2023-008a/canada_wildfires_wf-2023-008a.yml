stream:

  GEOSFPANA:

    long_name: GEOS FP
    description: GEOS FP Analysis
    type: analysis
    downloading: enabled
    access: public
    uri: /discover/nobackup/projects/gmao/yotc/pub/f5295_fp/opendap/assim/$collection
  # uri: /discover/nobackup/projects/gmao/yotc/pub/fp/opendap/assim/$collection
    service: !!python/object/apply:dataservice.GEOSDDF []
    animation: enabled
    max_frames: 20
    institution: NASA - Global Modeling and Assimilation Office (GMAO)
    reference: http://gmao.gsfc.nasa.gov/GEOS/geos5/index_pubs.php
    link: http://gmao.gsfc.nasa.gov/GEOS
    logos: [nasa-logo-ul, gmao-logo-ur]

field:
  
  GEOSFPANA:

    _bccmass:
      long_name: Black Carbon Column Mass Density
      units: kg m-2
      expression: bccmass.inst1_2d_hwl_Nx

map:

  map-smoke:
    service: SmokeForecastBasemap_200406.3x21600x10800
    file: /discover/nobackup/jardizzo/maps/BlueMarble/SmokeForecastBasemap_200406.3x21600x10800.png
    line_color: 0 0 0 100
    line_width: 2
    water_color: 0 0 0 0
    land_color: 0 0 0 0
    layers: [water, land, lsmask]

region:

  nam:
    
    long_name: North America
    lon: -180 180
    lat: 0 90
    mpdset: hires
    mproj: nps
    mpvals: 230 310 20 86
    frame: 'off'

  global:

    long_name: Global
    lon: -180 180
    lat: -90 90
    mpdset: lowres
    mproj: scaled
    mpvals:
    frame: 'off'

theme:

  plot:

    bccmass:
      long_name: BCCMASS
      levels: [0]
      layers: [bccmass]
      title: 'Black Carbon Column Mass'
      map:
        layers: [map-smoke]

  layer:

    bccmass:
      gxout: shaded
      expr: _bccmass*1.0e+6
      cbar: Colorbar_14C
      cbunits: '[mg/m`a2`n]'
      clevs:
      scale:
      cmin: 0
      cmax: 12
      cint: 1
      scale:
      nsub: 20
      skip: 20
      alpha:
        - 0.000 0.000 0.000
        - 0.040 0.000 0.000
        - 0.200 1.000 1.000
        - 1.000 1.000 1.000

