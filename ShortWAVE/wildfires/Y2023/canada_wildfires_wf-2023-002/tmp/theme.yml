#wxmapschem2d:
theme:

  plot:

    cobbna:
      long_name: CO Biomass Burning North America
      levels: [0]
      layers: [cobbna, qfed1, qfed2]
      title: 'Column CO from North American Wildfires [10`a18`n molecules cm`a-2`n]'
      map:
        line_color: 255 255 255
        line_width: 2
        layers: [bluemarble01]

  layer:

    cobbna:
      gxout: shaded
      expr: _coclbbna*2150
      cbar: myinferno
      cmin:
      cmax:
      cint:
      clevs: 0.02 0.025 0.03 0.035 0.04 0.08 0.16 0.32 0.64 1.28 2.56
      nsub: 10
      skip: 10
      scale: exp_scale
      alpha:
        - 0.00 0.0 0.0
        - 0.03 0.0 0.0
        - 0.05 1.0 1.0
        - 1.00 1.0 1.0

    qfed1:
      gxout: grid
      cmark: 9
      digsiz: 0.08
      ccolor: 230 0 0
      cthick: 5
      expr: maskout(_biomass, _biomass-0.00000008)
      
    qfed2:
      gxout: grid
      cmark: 8
      digsiz: 0.08
      ccolor: 0 0 0
      cthick: 5
      expr: maskout(_biomass, _biomass-0.00000008)
